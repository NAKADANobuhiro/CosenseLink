name: Update Cosense Data

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分に実行
  workflow_dispatch:       # 手動実行も可能
    inputs:
      force:
        description: 'タイムスタンプを無視して強制実行する'
        type: boolean
        default: false

permissions:
  contents: write  # a6j.js の自動コミット・push に必要

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if Cosense data was updated since last commit
        id: check_update
        run: |
          # Cosense プロジェクトの最終更新時刻を取得（軽量 API）
          META=$(curl -s \
            --cookie "connect.sid=${{ secrets.COSENSE_SID }}" \
            "https://scrapbox.io/api/projects/a6j")

          COSENSE_UPDATED=$(echo "$META" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print(d.get('updated', 0))
          " 2>/dev/null)

          if [ -z "$COSENSE_UPDATED" ] || [ "$COSENSE_UPDATED" = "0" ]; then
            echo "::error::プロジェクトメタデータの取得に失敗しました。SID を確認してください。"
            echo "$META"
            exit 1
          fi

          # 前回処理時の Cosense タイムスタンプをファイルから取得
          LAST_COMMIT=$(cat .cosense-last-updated 2>/dev/null || echo "0")

          echo "Cosense last updated  : $COSENSE_UPDATED ($(date -d @$COSENSE_UPDATED --utc '+%Y-%m-%d %H:%M:%S UTC' 2>/dev/null || date -r $COSENSE_UPDATED '+%Y-%m-%d %H:%M:%S UTC' 2>/dev/null || echo 'unknown'))"
          echo "Last processed (file) : $LAST_COMMIT ($(date -d @$LAST_COMMIT --utc '+%Y-%m-%d %H:%M:%S UTC' 2>/dev/null || date -r $LAST_COMMIT '+%Y-%m-%d %H:%M:%S UTC' 2>/dev/null || echo 'unknown'))"

          # 後続ステップで使用するため出力に保存
          echo "cosense_updated=$COSENSE_UPDATED" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "⚡ 強制実行モード — タイムスタンプを無視して取得します"
          elif [ "$COSENSE_UPDATED" -gt "$LAST_COMMIT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "🔄 Cosense に新しい更新があります — JSON を取得します"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ 前回処理以降に更新なし — スキップします"
          fi

      - name: Set up Python
        if: steps.check_update.outputs.needs_update == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Cosense export JSON
        if: steps.check_update.outputs.needs_update == 'true'
        run: |
          HTTP_STATUS=$(curl -s -o cosense_export.json -w "%{http_code}" \
            --cookie "connect.sid=${{ secrets.COSENSE_SID }}" \
            "https://scrapbox.io/api/page-data/export/a6j.json")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cosense API returned HTTP $HTTP_STATUS. SID が無効か期限切れの可能性があります。"
            exit 1
          fi

          # レスポンス内容を確認（先頭500文字をログ出力）
          echo "--- レスポンス先頭500文字 ---"
          head -c 500 cosense_export.json
          echo ""
          echo "--- ファイルサイズ ---"
          wc -c cosense_export.json

          # レスポンスが JSON かチェック
          if ! python3 -c "import json,sys; json.load(open('cosense_export.json'))" 2>/dev/null; then
            echo "::error::レスポンスが有効な JSON ではありません。"
            cat cosense_export.json
            exit 1
          fi

          # pages が空でないかチェック
          PAGE_COUNT=$(python3 -c "
          import json, sys
          d = json.load(open('cosense_export.json'))
          pages = d if isinstance(d, list) else d.get('pages', [])
          print(len(pages))
          ")
          echo "取得ページ数: $PAGE_COUNT"

          if [ "$PAGE_COUNT" = "0" ]; then
            echo "::error::pages が空です。SID の権限または API エンドポイントを確認してください。"
            exit 1
          fi

          echo "✅ JSON 取得成功 ($PAGE_COUNT ページ)"

      - name: Generate and commit updated a6j.js
        if: steps.check_update.outputs.needs_update == 'true'
        run: |
          # exported フィールドを最終編集時刻で上書き
          # 優先順位: ①ページ単位の updated 最大値 > ②元の exported（API 取得時刻）
          python3 -c "
          import json
          data = json.load(open('cosense_export.json'))
          pages = data.get('pages', [])
          max_page_updated = max((p.get('updated', 0) for p in pages), default=0)
          if max_page_updated > 0:
              data['exported'] = max_page_updated
              print(f'exported = max page updated: {max_page_updated}')
          else:
              print(f'exported = original value: {data.get(\"exported\", \"N/A\")}')
          json.dump(data, open('cosense_export.json', 'w'), ensure_ascii=False)
          "
          python tool/update-a6j-js.py cosense_export.json /tmp/a6j_new.js -f -e

          # 生成結果を現在のファイルと比較（念のため）
          if diff -q a6j.js /tmp/a6j_new.js > /dev/null 2>&1; then
            echo "📭 内容に差分なし — コミットをスキップします"
            exit 0
          fi

          cp /tmp/a6j_new.js a6j.js

          # 今回処理した Cosense タイムスタンプを記録（次回の比較用）
          echo "${{ steps.check_update.outputs.cosense_updated }}" > .cosense-last-updated

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/NAKADANobuhiro/CosenseLink.git
          git add a6j.js .cosense-last-updated
          git commit -m "chore: update a6j.js from Cosense backup [skip ci]"
          git push origin main
          echo "🚀 a6j.js を更新して push しました"

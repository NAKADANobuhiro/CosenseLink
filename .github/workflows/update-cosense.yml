name: Update Cosense Data

on:
  schedule:
    - cron: '0 * * * *'  # 毎時0分に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Cosense export JSON
        id: fetch
        run: |
          HTTP_STATUS=$(curl -s -o cosense_export.json -w "%{http_code}" \
            --cookie "connect.sid=${{ secrets.COSENSE_SID }}" \
            "https://scrapbox.io/api/pages/a6j/export?type=json")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Cosense API returned HTTP $HTTP_STATUS. SID が無効か期限切れの可能性があります。"
            exit 1
          fi

          # レスポンスが JSON かチェック
          if ! python3 -c "import json,sys; json.load(open('cosense_export.json'))" 2>/dev/null; then
            echo "::error::レスポンスが有効な JSON ではありません。"
            cat cosense_export.json
            exit 1
          fi

          echo "✅ JSON 取得成功"

      - name: Generate new a6j.js
        run: |
          python tool/update-a6j-js.py cosense_export.json /tmp/a6j_new.js -f -e

      - name: Check if data has changed
        id: check
        run: |
          if diff -q a6j.js /tmp/a6j_new.js > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "📭 データに変更なし — スキップします"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "📬 データが更新されました — a6j.js を更新します"
          fi

      - name: Update a6j.js
        if: steps.check.outputs.changed == 'true'
        run: |
          cp /tmp/a6j_new.js a6j.js

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add a6j.js
          git commit -m "chore: update a6j.js from Cosense backup [skip ci]"
          git push

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosense Graph Viewer v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="a6j.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d1117; --panel:#161b22; --card:#1c2128; --card-head:#21262d;
  --border:#30363d; --dim:#21262d; --text:#e6edf3; --muted:#8b949e;
  --blue:#58a6ff; --green:#3fb950; --red:#f78166; --yellow:#e3b341;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;display:flex;flex-direction:column;}

/* ── Loading ── */
#loading{display:flex;align-items:center;justify-content:center;flex-direction:column;flex:1;gap:14px;color:var(--muted);font-size:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading-msg{color:var(--muted);font-size:14px;}

/* ── App ── */
#app{display:none;flex-direction:column;flex:1;overflow:hidden;}
#app.active{display:flex;}

/* Header */
#header{height:50px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:20;}
#project-name{font-weight:700;color:var(--blue);font-size:15px;white-space:nowrap;}
#project-name a{color:inherit;text-decoration:none;}
#project-name a:hover{text-decoration:underline;}
#stats{color:var(--muted);font-size:12px;white-space:nowrap;}
#search-wrap{position:relative;margin-left:auto;}
#search{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:6px;outline:none;font-size:13px;width:220px;}
#search-results{display:none;position:absolute;top:calc(100% + 4px);right:0;background:var(--panel);border:1px solid var(--border);border-radius:8px;width:300px;max-height:260px;overflow-y:auto;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.6);}
#search-results.show{display:block;}
.sr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--dim);font-size:13px;display:flex;gap:8px;align-items:center;}
.sr-item:hover{background:var(--dim);}
.sr-deg{margin-left:auto;color:var(--muted);font-size:11px;}
.hdr-btn{background:var(--dim);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;}

/* Main */
#main{flex:1;display:flex;overflow:hidden;position:relative;}
#graph-canvas{flex:1;min-width:0;display:block;cursor:grab;}
#graph-canvas.grabbing{cursor:grabbing;}

/* Legend */
#legend{position:absolute;bottom:14px;right:14px;background:#161b22cc;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--muted);backdrop-filter:blur(4px);pointer-events:none;transition:right .35s;}
#legend .row{display:flex;gap:12px;margin-bottom:3px;}

/* History */
#history-bar{position:absolute;bottom:14px;left:14px;display:flex;gap:6px;flex-wrap:wrap;max-width:55%;z-index:10;}
.hist-tag{background:var(--dim);border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-size:11px;cursor:pointer;color:var(--text);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hist-tag.current{background:#1f6feb;border-color:#1f6feb;}

/* Side Panel */
#side-panel{width:460px;background:var(--panel);border-left:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;overflow:hidden;}
#side-panel.open{display:flex;}
#panel-nav{height:42px;background:var(--card-head);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;}
#btn-back{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 6px;border-radius:4px;line-height:1;}
#btn-back:hover{background:var(--dim);color:var(--text);}
#btn-back:disabled{opacity:.3;cursor:default;}
#btn-back:disabled:hover{background:none;}
#panel-breadcrumb{flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#btn-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:4px 6px;border-radius:4px;}
#btn-close:hover{background:var(--dim);color:var(--text);}
#panel-scroll{flex:1;overflow-y:auto;padding:0;}
#panel-scroll::-webkit-scrollbar{width:5px;}
#panel-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* Document Page */
.cosense-doc{}
.doc-title{font-size:22px;font-weight:700;color:var(--text);line-height:1.4;word-break:break-word;padding:22px 22px 6px;}
.doc-meta{display:flex;gap:14px;font-size:11px;color:var(--muted);flex-wrap:wrap;padding:0 22px 14px;border-bottom:1px solid var(--dim);}
.doc-body{padding:6px 0 8px;font-size:13px;}
.doc-body .ilink{color:var(--blue);cursor:pointer;text-decoration:underline;text-decoration-color:#58a6ff55;}
.doc-body .ilink:hover{text-decoration-color:var(--blue);}
.doc-body a{color:var(--blue);}
.doc-body code{background:#0d1117;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:.88em;border:1px solid var(--border);}
.doc-body img{max-width:100%;border-radius:6px;margin:4px 0;display:block;}
.doc-body strong{color:#fff;}
.doc-body em{color:var(--yellow);font-style:italic;}
.doc-body del{color:var(--muted);}
.c-line{display:flex;align-items:flex-start;padding:1px 22px;min-height:24px;border-radius:3px;}
.c-line:hover{background:rgba(255,255,255,0.025);}
.c-bullet{flex-shrink:0;width:18px;color:var(--muted);font-size:11px;padding-top:4px;user-select:none;text-align:center;}
.c-text{flex:1;line-height:1.75;word-break:break-word;}
.c-empty{height:6px;}
.c-code-wrap{margin:4px 22px 6px;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.c-code-title{background:var(--card-head);padding:3px 10px;font-size:11px;color:var(--muted);font-family:monospace;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.c-code-wrap pre{background:#0d1117;margin:0;padding:10px 12px;overflow-x:auto;font-size:12px;font-family:"SFMono-Regular",Consolas,monospace;line-height:1.55;color:var(--text);}
.c-quote{border-left:3px solid var(--border);padding:2px 10px;margin:2px 22px;color:var(--muted);font-style:italic;}
.doc-section{padding:12px 22px;border-top:1px solid var(--dim);}
.section-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-weight:600;}
.chips{display:flex;flex-wrap:wrap;gap:5px;}
.chip{padding:3px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;}
.chip-link{background:#1f6feb22;border-color:#1f6feb55;color:var(--blue);}
.chip-link:hover{border-color:var(--blue);background:#1f6feb33;}
.chip-back{background:#3fb95022;border-color:#3fb95055;color:var(--green);}
.chip-back:hover{border-color:var(--green);background:#3fb95033;}
.chip-dead{background:var(--dim);border-color:var(--border);color:var(--muted);cursor:default;}
.empty-hint{color:var(--muted);font-size:12px;font-style:italic;padding:8px 22px;}

/* ── Error Overlay ── */
#error-overlay{display:none;position:fixed;inset:0;background:#0d1117ee;z-index:9999;align-items:center;justify-content:center;}
#error-overlay.show{display:flex;}
#error-box{background:#1c2128;border:1px solid #f7816688;border-radius:12px;padding:24px 28px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;}
#error-box h2{color:var(--red);margin-bottom:12px;font-size:16px;}
#error-log{font-family:monospace;font-size:12px;color:#e6edf3;white-space:pre-wrap;word-break:break-all;margin-bottom:16px;max-height:300px;overflow-y:auto;background:#0d1117;padding:10px;border-radius:6px;border:1px solid var(--border);}
#error-dismiss{background:var(--dim);border:1px solid var(--border);color:var(--text);padding:7px 18px;border-radius:6px;cursor:pointer;font-size:13px;}

/* ── Log Bar ── */
#log-bar{position:fixed;bottom:0;left:0;right:0;background:#0d111799;border-top:1px solid var(--border);padding:3px 10px;font-size:11px;font-family:monospace;color:var(--muted);display:none;z-index:100;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#log-bar.show{display:block;}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <span id="loading-msg">データを読み込んでいます...</span>
</div>

<!-- App -->
<div id="app">
  <div id="header">
    <span id="project-name">🕸️</span>
    <span id="stats"></span>
    <div id="search-wrap">
      <input type="text" id="search" placeholder="🔍 ページを検索...">
      <div id="search-results"></div>
    </div>
  </div>
  <div id="main">
    <canvas id="graph-canvas"></canvas>
    <div id="history-bar"></div>
    <div id="legend">
      <div class="row">
        <span style="color:var(--red)">● 選択</span>
        <span style="color:var(--green)">● 隣接</span>
        <span style="color:var(--blue)">● その他</span>
      </div>
      <div>ドラッグ: 移動 · スクロール: ズーム · クリック: 詳細</div>
    </div>
    <div id="side-panel">
      <div id="panel-nav">
        <button id="btn-back" disabled>←</button>
        <span id="panel-breadcrumb"></span>
        <button id="btn-close">×</button>
      </div>
      <div id="panel-scroll"></div>
    </div>
  </div>
</div>

<!-- Error Overlay -->
<div id="error-overlay">
  <div id="error-box">
    <h2>⚠️ エラーが発生しました</h2>
    <pre id="error-log"></pre>
    <button id="error-dismiss">閉じる</button>
  </div>
</div>

<!-- Log Bar -->
<div id="log-bar"></div>

<script>
/* ══════════════════════════════════════════════════════════
   EMBEDDED DATA (自動埋め込み済み / 選択不要)
══════════════════════════════════════════════════════════ */

/* ══════════════════════════════════════════════════════════
   ERROR HANDLING
══════════════════════════════════════════════════════════ */
const errorLog = [];
function logError(msg, err) {
  const line = `[ERROR] ${msg}${err ? '\n' + (err.stack || err.message || err) : ''}`;
  errorLog.push(line);
  console.error(line);
  showErrorOverlay(errorLog.join('\n\n'));
}
function logInfo(msg) {
  console.log('[INFO]', msg);
  const bar = document.getElementById('log-bar');
  bar.textContent = msg;
  bar.classList.add('show');
  clearTimeout(bar._t);
  bar._t = setTimeout(() => bar.classList.remove('show'), 4000);
}
function showErrorOverlay(text) {
  document.getElementById('error-log').textContent = text;
  document.getElementById('error-overlay').classList.add('show');
}
document.getElementById('error-dismiss').addEventListener('click', () => {
  document.getElementById('error-overlay').classList.remove('show');
});
window.addEventListener('error', e => {
  logError('未捕捉のエラー: ' + e.message, { stack: `${e.filename}:${e.lineno}:${e.colno}` });
});
window.addEventListener('unhandledrejection', e => {
  logError('未捕捉のPromiseエラー', e.reason);
});

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let graphData  = null;
let simNodes   = [];
let simLinks   = [];
let simulation = null;
let zoomBeh    = null;
let transform  = d3.zoomIdentity;
let highlight  = { sel: null, nbrs: new Set() };
let maxDegree  = 1;
let navStack   = [];
let navHist    = [];
let eventCtrl  = null;

const canvas = document.getElementById('graph-canvas');
const ctx    = canvas.getContext('2d');

/* ══════════════════════════════════════════════════════════

/* ══════════════════════════════════════════════════════════
   SCREEN
══════════════════════════════════════════════════════════ */
function showScreen(id) {
  document.getElementById('loading').style.display = id === 'loading' ? 'flex' : 'none';
  document.getElementById('app').classList.toggle('active', id === 'app');
}

/* ══════════════════════════════════════════════════════════
   GRAPH BUILD
══════════════════════════════════════════════════════════ */
function buildGraph(json) {
  try {
    const rawPages = Array.isArray(json) ? json : (json.pages || []);
    logInfo(`ページ数: ${rawPages.length} 件 — グラフを構築中...`);

    const titleByLower = new Map();
    rawPages.forEach(p => {
      if (p.title && !titleByLower.has(p.title.toLowerCase()))
        titleByLower.set(p.title.toLowerCase(), p.title);
    });

    const nodes = rawPages.map(p => ({
      id: p.title, title: p.title,
      lines: p.lines || [], linksLc: p.linksLc || [],
      views: p.views || 0, updated: p.updated || 0, degree: 0,
    }));

    const nodeById = new Map(nodes.map(n => [n.id, n]));
    const edgeSet  = new Set();
    const links    = [];

    nodes.forEach(src => {
      (src.linksLc || []).forEach(raw => {
        const real = titleByLower.get(raw.toLowerCase());
        if (!real) return;
        const tgt = nodeById.get(real);
        if (!tgt || tgt === src) return;
        const key = [src.id, tgt.id].sort().join('\0');
        if (edgeSet.has(key)) return;
        edgeSet.add(key);
        links.push({ source: src.id, target: tgt.id });
        src.degree++; tgt.degree++;
      });
    });

    const neighborMap = new Map();
    const backlinkMap = new Map();

    links.forEach(l => {
      const s = l.source, t = l.target;
      if (!neighborMap.has(s)) neighborMap.set(s, new Set());
      if (!neighborMap.has(t)) neighborMap.set(t, new Set());
      neighborMap.get(s).add(t);
      neighborMap.get(t).add(s);
    });

    nodes.forEach(src => {
      (src.linksLc || []).forEach(raw => {
        const real = titleByLower.get(raw.toLowerCase());
        if (!real || real === src.id) return;
        if (!backlinkMap.has(real)) backlinkMap.set(real, []);
        if (!backlinkMap.get(real).includes(src.id))
          backlinkMap.get(real).push(src.id);
      });
    });

    logInfo(`ノード: ${nodes.length}, エッジ: ${links.length}`);
    return {
      nodes, links, nodeById, neighborMap, backlinkMap,
      meta: { name: json.displayName || json.name || 'Cosense', projectId: json.name || 'a6j' },
    };
  } catch(err) {
    logError('グラフデータの構築中にエラー', err);
    throw err;
  }
}

/* ══════════════════════════════════════════════════════════
   INIT GRAPH
══════════════════════════════════════════════════════════ */
function initGraph(json) {
  try {
    if (simulation) simulation.stop();
    graphData = buildGraph(json);
    navStack = []; navHist = [];
    highlight = { sel: null, nbrs: new Set() };
    maxDegree = Math.max(...graphData.nodes.map(n => n.degree), 1);

    const projectUrl = `https://scrapbox.io/${graphData.meta.projectId}/`;
    document.getElementById('project-name').innerHTML =
      `🕸️ <a href="${projectUrl}" target="_blank" rel="noopener">${graphData.meta.name}</a>`;
    document.getElementById('stats').textContent =
      `${graphData.nodes.length} pages · ${graphData.links.length} links`;

    // ① 先に #app を表示して #main がレイアウトを持つようにする
    closePanel();
    renderHistory();
    showScreen('app');

    // ② rAF でレイアウト確定を待ってから Canvas サイズ・シミュレーションを初期化
    requestAnimationFrame(() => {
      try {
        resizeCanvas();

        simNodes = graphData.nodes.map(d => ({ ...d }));
        simLinks = graphData.links.map(d => ({ source: d.source, target: d.target }));

        simulation = d3.forceSimulation(simNodes)
          .force('link', d3.forceLink(simLinks).id(d => d.id).distance(70).strength(0.4))
          .force('charge', d3.forceManyBody().strength(-120).distanceMax(260))
          .force('center', d3.forceCenter(canvas.width / 2, canvas.height / 2))
          .force('collision', d3.forceCollide().radius(d => 4 + d.degree / 2))
          .alphaDecay(0.025)
          .on('tick', draw)
          .on('end', () => logInfo('レイアウト完了'));

        zoomBeh = d3.zoom().scaleExtent([0.04, 12])
          .on('zoom', ev => { transform = ev.transform; draw(); });
        d3.select(canvas).call(zoomBeh);

        initPointerEvents();
        logInfo('グラフを表示しました');
      } catch(err) {
        logError('グラフの描画初期化中にエラー', err);
      }
    });
  } catch(err) {
    logError('グラフの初期化中にエラー', err);
    showScreen('app');
  }
}

/* ══════════════════════════════════════════════════════════
   CANVAS DRAW
══════════════════════════════════════════════════════════ */
function resizeCanvas() {
  canvas.width  = canvas.clientWidth;
  canvas.height = canvas.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); draw(); });

function rScale(deg) { return 3.5 + (deg / maxDegree) * 14; }

function draw() {
  try {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    const hasSel = !!highlight.sel;
    const { sel, nbrs } = highlight;

    // Faded links
    ctx.beginPath();
    ctx.strokeStyle = '#21262d'; ctx.lineWidth = 0.5 / transform.k;
    ctx.globalAlpha = hasSel ? 0.07 : 0.35;
    simLinks.forEach(l => {
      const s = l.source, t = l.target;
      if (!s.x || !t.x) return;
      if (hasSel && (s.id === sel || t.id === sel)) return;
      ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y);
    });
    ctx.stroke();

    // Highlighted links
    if (hasSel) {
      ctx.beginPath();
      ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1.5 / transform.k;
      ctx.globalAlpha = 0.85;
      simLinks.forEach(l => {
        const s = l.source, t = l.target;
        if (!s.x || !t.x) return;
        if (s.id === sel || t.id === sel) { ctx.moveTo(s.x, s.y); ctx.lineTo(t.x, t.y); }
      });
      ctx.stroke();
    }

    // Nodes
    ctx.globalAlpha = 1;
    simNodes.forEach(n => {
      if (!n.x) return;
      const r = rScale(n.degree);
      const isSel = n.id === sel, isNbr = nbrs.has(n.id);
      let color, alpha;
      if (!hasSel)    { color = '#58a6ff'; alpha = 0.85; }
      else if (isSel) { color = '#f78166'; alpha = 1; }
      else if (isNbr) { color = '#3fb950'; alpha = 0.9; }
      else            { color = '#21262d'; alpha = 0.25; }
      ctx.globalAlpha = alpha;
      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color; ctx.fill();
      if (isSel) {
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 / transform.k; ctx.stroke();
      }
      const showLabel = isSel || isNbr || n.degree >= 8 || transform.k >= 1.5;
      if (transform.k >= 0.5 && showLabel) {
        ctx.globalAlpha = isSel ? 1 : (isNbr ? 0.9 : 0.65);
        const fs = Math.min(12, Math.max(8, r + 1));
        ctx.font = `${fs / transform.k}px system-ui`;
        ctx.fillStyle = '#e6edf3';
        const lbl = n.title.length > 24 ? n.title.slice(0, 24) + '…' : n.title;
        ctx.fillText(lbl, n.x + r / transform.k + 2, n.y + 4 / transform.k);
      }
    });
    ctx.globalAlpha = 1; ctx.restore();
  } catch(err) {
    logError('描画中にエラー', err);
  }
}

/* ══════════════════════════════════════════════════════════
   POINTER EVENTS
══════════════════════════════════════════════════════════ */
function hitNode(cx, cy) {
  const wx = (cx - transform.x) / transform.k;
  const wy = (cy - transform.y) / transform.k;
  for (let i = simNodes.length - 1; i >= 0; i--) {
    const n = simNodes[i];
    if (!n.x) continue;
    const r = rScale(n.degree) + 5;
    const dx = wx - n.x, dy = wy - n.y;
    if (dx * dx + dy * dy <= r * r) return n;
  }
  return null;
}

function initPointerEvents() {
  if (eventCtrl) eventCtrl.abort();
  eventCtrl = new AbortController();
  const sig = { signal: eventCtrl.signal };
  let downNode = null, moved = false;
  canvas.addEventListener('pointerdown', e => {
    const r = canvas.getBoundingClientRect();
    downNode = hitNode(e.clientX - r.left, e.clientY - r.top);
    moved = false; canvas.classList.add('grabbing');
    console.log('[DBG] pointerdown  downNode=', downNode ? downNode.title : null,
      ' canvas:', canvas.width, 'x', canvas.height);
  }, sig);
  canvas.addEventListener('pointermove', e => {
    if (e.buttons > 0) moved = true;  // ボタン押下中のみ移動判定
    else {
      const r = canvas.getBoundingClientRect();
      canvas.style.cursor = hitNode(e.clientX - r.left, e.clientY - r.top) ? 'pointer' : 'grab';
    }
  }, sig);
  canvas.addEventListener('pointerup', e => {
    canvas.classList.remove('grabbing');
    const r = canvas.getBoundingClientRect();
    const n = hitNode(e.clientX - r.left, e.clientY - r.top);
    console.log('[DBG] pointerup  moved=', moved, ' hitNode=', n ? n.title : null,
      ' downNode=', downNode ? downNode.title : null,
      ' match=', n === downNode);
    if (moved) { console.log('[DBG] → skipped (moved)'); return; }
    if (n && n === downNode) selectNode(n);
    else if (!n) clearSelection();
  }, sig);
}

/* ══════════════════════════════════════════════════════════
   SELECT / NAVIGATE
══════════════════════════════════════════════════════════ */
function selectNode(simNode) {
  console.log('[DBG] selectNode  id=', simNode.id, ' title=', simNode.title);
  try {
    const nbrs = graphData.neighborMap.get(simNode.id) || new Set();
    highlight = { sel: simNode.id, nbrs }; draw();
    const last = navStack[navStack.length - 1];
    if (!last || last.id !== simNode.id)
      navStack.push({ id: simNode.id, title: simNode.title });
    const hlast = navHist[navHist.length - 1];
    if (!hlast || hlast.id !== simNode.id)
      navHist = [...navHist.slice(-19), { id: simNode.id, title: simNode.title }];
    renderHistory();
    console.log('[DBG] calling openCard ...');
    openCard(simNode);
    console.log('[DBG] openCard done, panel open=',
      document.getElementById('side-panel').classList.contains('open'));
    flyTo(simNode);
  } catch(err) {
    console.error('[DBG] selectNode ERROR:', err);
    logError('ノード選択中にエラー', err);
  }
}

function flyTo(simNode) {
  if (!simNode.x) return;
  const W = canvas.width, H = canvas.height;
  const scale = Math.max(transform.k, 1.2);
  d3.select(canvas).transition().duration(600)
    .call(zoomBeh.transform, d3.zoomIdentity
      .translate(W / 2 - scale * simNode.x, H / 2 - scale * simNode.y)
      .scale(scale));
}

function clearSelection() {
  highlight = { sel: null, nbrs: new Set() }; draw();
  closePanel();
}

function navigateTo(titleRaw) {
  try {
    const t = titleRaw.trim();
    const n = simNodes.find(x => x.id === t) ||
              simNodes.find(x => x.id.toLowerCase() === t.toLowerCase());
    if (n) selectNode(n);
    else logInfo(`ページが見つかりません: ${t}`);
  } catch(err) {
    logError('ナビゲーション中にエラー', err);
  }
}

/* ══════════════════════════════════════════════════════════
   COSENSE MARKUP
══════════════════════════════════════════════════════════ */
function cosenseToHtml(text) {
  let s = escHtml(text);
  s = s.replace(/\[\*{3,}\s(.+?)\]/g, '<strong style="font-size:1.25em;color:#fff">$1</strong>');
  s = s.replace(/\[\*{2}\s(.+?)\]/g,  '<strong style="font-size:1.1em;color:#fff">$1</strong>');
  s = s.replace(/\[\*\s(.+?)\]/g,     '<strong>$1</strong>');
  s = s.replace(/\[\/\s(.+?)\]/g,     '<em>$1</em>');
  s = s.replace(/\[-\s(.+?)\]/g,      '<del>$1</del>');
  s = s.replace(/\[(https?:\/\/[^\[\]\s]+\.(?:png|jpg|jpeg|gif|webp|svg)(?:\?[^\[\]\s]*)?)\]/gi,
    '<img src="$1" alt="">');
  s = s.replace(/\[(https?:\/\/(?:www\.youtube\.com|youtu\.be|vimeo\.com)[^\[\]\s]+)\]/g,
    '<a href="$1" target="_blank" rel="noopener">▶ 動画</a>');
  s = s.replace(/\[([^\[\]]+?)\s+(https?:\/\/[^\[\]\s]+)\]/g,
    '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\[(https?:\/\/[^\[\]\s]+)\]/g,
    '<a href="$1" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\[([^\[\]]+)\]/g,
    '<span class="ilink" data-link="$1">$1</span>');
  // #hashtag は HTML タグ属性の内側（< > の間）では置換しない
  s = s.replace(/#(\S+)/g, (m, tag, offset, str) => {
    const before = str.slice(0, offset);
    if (before.lastIndexOf('<') > before.lastIndexOf('>')) return m; // タグ内はスキップ
    return `<span class="ilink" data-link="${tag}" style="color:var(--green)">#${tag}</span>`;
  });
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  return s;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

/* ══════════════════════════════════════════════════════════
   DOCUMENT PAGE
══════════════════════════════════════════════════════════ */
function buildCard(node) {
  console.log('[DBG] buildCard  node.id=', node.id, ' nodeById hit=', graphData.nodeById.has(node.id));
  const orig = graphData.nodeById.get(node.id) || node;
  const backlinks = graphData.backlinkMap.get(node.id) || [];
  console.log('[DBG] buildCard  orig.title=', orig.title, ' lines=', (orig.lines||[]).length,
    ' backlinks=', backlinks.length);
  const doc = document.createElement('div');
  doc.className = 'cosense-doc';

  // タイトル
  const titleEl = document.createElement('div');
  titleEl.className = 'doc-title';
  titleEl.textContent = orig.title;
  doc.appendChild(titleEl);

  // メタ情報
  const metaParts = [];
  if (orig.degree > 0)      metaParts.push(`🔗 ${orig.degree} リンク`);
  if (backlinks.length > 0) metaParts.push(`⬅ ${backlinks.length} バックリンク`);
  if (orig.views)           metaParts.push(`👁 ${orig.views}`);
  if (orig.updated)         metaParts.push(`🕐 ${fmtDate(orig.updated)}`);
  if (metaParts.length) {
    const meta = document.createElement('div');
    meta.className = 'doc-meta';
    meta.innerHTML = metaParts.map(s => `<span>${s}</span>`).join('');
    doc.appendChild(meta);
  }

  // 本文 — Cosense ドキュメントスタイル
  const body = document.createElement('div');
  body.className = 'doc-body';

  const rawLines = (orig.lines || []).slice(1);
  let idx = 0;
  while (idx < rawLines.length) {
    const l = rawLines[idx];
    const raw = typeof l === 'string' ? l : (l.text || '');
    idx++;
    if (!raw.trim()) {
      const em = document.createElement('div'); em.className = 'c-empty';
      body.appendChild(em); continue;
    }
    const tabMatch = raw.match(/^\t+/);
    const level = tabMatch ? tabMatch[0].length : 0;
    const text = raw.slice(level);
    // コードブロック
    if (/^code($|:)/i.test(text)) {
      const lang = text.replace(/^code:?/i, '').trim() || '';
      const codeLines = [];
      while (idx < rawLines.length) {
        const cl = rawLines[idx];
        const ct = typeof cl === 'string' ? cl : (cl.text || '');
        if (!ct.trim()) { codeLines.push(''); idx++; continue; }
        const clevel = (ct.match(/^\t+/) || [''])[0].length;
        if (clevel <= level) break;
        codeLines.push(ct.slice(level + 1)); idx++;
      }
      const wrap = document.createElement('div'); wrap.className = 'c-code-wrap';
      if (lang) {
        const codeTitle = document.createElement('div'); codeTitle.className = 'c-code-title';
        codeTitle.innerHTML = '<span style="color:#58a6ff">⌨</span> ' + escHtml(lang);
        wrap.appendChild(codeTitle);
      }
      const pre = document.createElement('pre');
      pre.textContent = codeLines.join('\n').replace(/\n+$/, '');
      wrap.appendChild(pre); body.appendChild(wrap); continue;
    }
    // 引用
    if (/^>\s/.test(text) || text === '>') {
      const q = document.createElement('div'); q.className = 'c-quote';
      q.innerHTML = cosenseToHtml(text.replace(/^>\s?/, ''));
      body.appendChild(q); continue;
    }
    // 通常行
    const lineDiv = document.createElement('div'); lineDiv.className = 'c-line';
    if (level > 0) {
      lineDiv.style.paddingLeft = (22 + (level - 1) * 22) + 'px';
      const b = document.createElement('span'); b.className = 'c-bullet';
      b.textContent = level === 1 ? '•' : level === 2 ? '◦' : '▸';
      lineDiv.appendChild(b);
    }
    const t = document.createElement('span'); t.className = 'c-text';
    t.innerHTML = cosenseToHtml(text);
    lineDiv.appendChild(t);
    body.appendChild(lineDiv);
  }
  if (!body.hasChildNodes()) {
    const p = document.createElement('p'); p.className = 'empty-hint'; p.textContent = '（本文なし）';
    body.appendChild(p);
  }
  body.addEventListener('click', e => {
    const link = e.target.dataset?.link || e.target.closest?.('[data-link]')?.dataset?.link;
    if (link) navigateTo(link);
  });
  doc.appendChild(body);

  // 出リンク
  const lcs = orig.linksLc || [];
  if (lcs.length) {
    const sec = document.createElement('div'); sec.className = 'doc-section';
    const lbl = document.createElement('div'); lbl.className = 'section-label';
    lbl.textContent = `出リンク (${lcs.length})`; sec.appendChild(lbl);
    const chips = document.createElement('div'); chips.className = 'chips';
    lcs.forEach(lc => {
      const exists = [...graphData.nodeById.keys()].some(k => k.toLowerCase() === lc.toLowerCase());
      const ch = document.createElement('span');
      ch.className = 'chip ' + (exists ? 'chip-link' : 'chip-dead');
      ch.textContent = lc; ch.title = lc;
      if (exists) ch.addEventListener('click', () => navigateTo(lc));
      chips.appendChild(ch);
    });
    sec.appendChild(chips); doc.appendChild(sec);
  }

  // バックリンク
  if (backlinks.length) {
    const sec = document.createElement('div'); sec.className = 'doc-section';
    const lbl = document.createElement('div'); lbl.className = 'section-label';
    lbl.textContent = `バックリンク (${backlinks.length})`; sec.appendChild(lbl);
    const chips = document.createElement('div'); chips.className = 'chips';
    backlinks.forEach(bl => {
      const ch = document.createElement('span');
      ch.className = 'chip chip-back'; ch.textContent = bl; ch.title = bl;
      ch.addEventListener('click', () => navigateTo(bl));
      chips.appendChild(ch);
    });
    sec.appendChild(chips); doc.appendChild(sec);
  }
  return doc;
}

/* ══════════════════════════════════════════════════════════
   PANEL
══════════════════════════════════════════════════════════ */
function openCard(simNode) {
  console.log('[DBG] openCard  title=', simNode.title);
  // まずパネルを開く（buildCardの成否に関わらず）
  document.getElementById('panel-breadcrumb').textContent = simNode.title;
  document.getElementById('btn-back').disabled = navStack.length <= 1;
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('legend').style.right = '474px';
  requestAnimationFrame(() => { resizeCanvas(); draw(); });
  const sp = document.getElementById('side-panel');
  const spRect = sp.getBoundingClientRect();
  console.log('[DBG] panel classList=', sp.className);
  console.log('[DBG] panel rect=', JSON.stringify({x:Math.round(spRect.x),y:Math.round(spRect.y),w:Math.round(spRect.width),h:Math.round(spRect.height)}));
  console.log('[DBG] panel computedDisplay=', getComputedStyle(sp).display,
    ' visibility=', getComputedStyle(sp).visibility,
    ' opacity=', getComputedStyle(sp).opacity);
  const main = document.getElementById('main');
  console.log('[DBG] #main rect=', JSON.stringify({w:Math.round(main.getBoundingClientRect().width),h:Math.round(main.getBoundingClientRect().height)}));

  const scroll = document.getElementById('panel-scroll');
  scroll.innerHTML = '';
  scroll.scrollTop = 0;
  try {
    const cardEl = buildCard(simNode);
    console.log('[DBG] buildCard returned, children=', cardEl.children.length);
    scroll.appendChild(cardEl);
    console.log('[DBG] scroll children=', scroll.children.length,
      ' scroll.offsetHeight=', scroll.offsetHeight,
      ' scroll.scrollHeight=', scroll.scrollHeight);
  } catch(err) {
    console.error('[DBG] buildCard ERROR:', err);
    logError('ドキュメントの構築中にエラー', err);
    const msg = document.createElement('div');
    msg.style.cssText = 'padding:20px;color:#f85149;font-size:13px;';
    msg.textContent = 'エラー: ' + err.message;
    scroll.appendChild(msg);
  }
}
function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('legend').style.right = '14px';
  requestAnimationFrame(() => { resizeCanvas(); draw(); });
  navStack = [];
  document.getElementById('panel-breadcrumb').textContent = '';
  document.getElementById('btn-back').disabled = true;
}
document.getElementById('btn-close').addEventListener('click', clearSelection);
document.getElementById('btn-back').addEventListener('click', () => {
  if (navStack.length <= 1) return;
  navStack.pop();
  const prev = navStack.pop();
  if (prev) navigateTo(prev.id);
});

/* ══════════════════════════════════════════════════════════
   HISTORY
══════════════════════════════════════════════════════════ */
function renderHistory() {
  const bar = document.getElementById('history-bar');
  bar.innerHTML = '';
  navHist.slice(-6).forEach((h, i, arr) => {
    const tag = document.createElement('span');
    tag.className = 'hist-tag' + (i === arr.length - 1 ? ' current' : '');
    tag.textContent = h.title; tag.title = h.title;
    tag.addEventListener('click', () => navigateTo(h.id));
    bar.appendChild(tag);
  });
}

/* ══════════════════════════════════════════════════════════
   SEARCH
══════════════════════════════════════════════════════════ */
const searchEl  = document.getElementById('search');
const searchRes = document.getElementById('search-results');
searchEl.addEventListener('input', () => {
  const q = searchEl.value.toLowerCase().trim();
  if (!q || !graphData) { searchRes.classList.remove('show'); return; }
  const hits = graphData.nodes
    .filter(n => n.title.toLowerCase().includes(q))
    .sort((a, b) => b.degree - a.degree).slice(0, 12);
  if (!hits.length) { searchRes.classList.remove('show'); return; }
  searchRes.innerHTML = '';
  hits.forEach(n => {
    const div = document.createElement('div'); div.className = 'sr-item';
    div.innerHTML = `<span style="color:var(--green);font-size:9px">●</span><span>${escHtml(n.title)}</span><span class="sr-deg">${n.degree}L</span>`;
    div.addEventListener('click', () => {
      navigateTo(n.id); searchEl.value = ''; searchRes.classList.remove('show');
    });
    searchRes.appendChild(div);
  });
  searchRes.classList.add('show');
});
document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target))
    searchRes.classList.remove('show');
});
